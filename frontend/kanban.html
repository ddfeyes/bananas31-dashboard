<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>svc-dash — Kanban</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0e1117; color:#d1d4dc; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:20px; }
h1 { font-size:18px; margin-bottom:4px; color:#f0c040; }
.subtitle { font-size:11px; color:#606680; margin-bottom:16px; }
.board { display:flex; gap:16px; overflow-x:auto; min-height:calc(100vh - 80px); }
.column { flex:0 0 280px; background:#131722; border:1px solid #2a3044; border-radius:8px; display:flex; flex-direction:column; }
.column-header { padding:12px 16px; font-weight:600; font-size:14px; border-bottom:1px solid #2a3044; display:flex; justify-content:space-between; align-items:center; }
.column-header .count { background:#2a3044; color:#606680; border-radius:10px; padding:2px 8px; font-size:12px; }
.col-backlog .column-header { border-top:3px solid #606680; }
.col-progress .column-header { border-top:3px solid #42a5f5; }
.col-review .column-header { border-top:3px solid #ab7df8; }
.col-done .column-header { border-top:3px solid #66bb6a; }
.col-blocked .column-header { border-top:3px solid #ef5350; }
.cards { padding:8px; flex:1; overflow-y:auto; }
.card { background:#1e2232; border:1px solid #2a3044; border-radius:6px; padding:10px 12px; margin-bottom:8px; cursor:default; transition:border-color .2s; }
.card:hover { border-color:#3a4460; }
.card-title { font-size:13px; font-weight:500; margin-bottom:6px; line-height:1.4; }
.card-meta { font-size:11px; color:#606680; display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.tag { padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; }
.tag-feat { background:#1a3a2a; color:#66bb6a; }
.tag-fix { background:#3a1a1a; color:#ef5350; }
.tag-infra { background:#1a2a3a; color:#42a5f5; }
.tag-test { background:#2a1a3a; color:#ab7df8; }
.tag-pr { background:#2a2a1a; color:#f0c040; }
.agent { font-size:10px; color:#42a5f5; }
.ts { font-size:10px; color:#3d4460; }
.refresh { position:fixed; top:20px; right:20px; background:#1e2232; border:1px solid #2a3044; color:#d1d4dc; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
.refresh:hover { border-color:#f0c040; }
</style>
</head>
<body>
<h1>🕸️ svc-dash Kanban</h1>
<div class="subtitle">Last updated: 2026-03-15 14:39 PDT · 23 PRs total · 17 merged</div>
<button class="refresh" onclick="location.reload()">↻ Refresh</button>
<div class="board">

<div class="column col-backlog">
<div class="column-header">Backlog <span class="count" id="cnt-backlog">0</span></div>
<div class="cards" id="backlog"></div>
</div>

<div class="column col-progress">
<div class="column-header">In Progress <span class="count" id="cnt-progress">0</span></div>
<div class="cards" id="progress"></div>
</div>

<div class="column col-review">
<div class="column-header">Review / PR <span class="count" id="cnt-review">0</span></div>
<div class="cards" id="review"></div>
</div>

<div class="column col-done">
<div class="column-header">Done <span class="count" id="cnt-done">0</span></div>
<div class="cards" id="done"></div>
</div>

<div class="column col-blocked">
<div class="column-header">Blocked <span class="count" id="cnt-blocked">0</span></div>
<div class="cards" id="blocked"></div>
</div>

</div>
<script>
const DATA = {
  backlog: [
    {title:"Full restart recovery test (simulate crash)",tags:["infra"],agent:"Lain"},
    {title:"End-to-end flow: think→brainstorm→spec→AO→PR→CI",tags:["test"],agent:"Lain"},
    {title:"RuFlo planning integration test",tags:["infra"],agent:"Lain"},
  ],
  progress: [
    {title:"Fix OI USDT display, price precision 6 decimals, Loading→No data",tags:["fix"],agent:"AO sd-6",pr:"PR #21 open"},
    {title:"Fix empty/broken charts (correlations, vol profile, aggressor)",tags:["fix"],agent:"AO sd-7",pr:"PR #23 open"},
  ],
  review: [
    {title:"Aggressor imbalance streak counter",tags:["feat","pr"],agent:"AO",pr:"PR #22"},
    {title:"Tape speed indicator",tags:["feat","pr"],agent:"AO",pr:"PR #20"},
    {title:"Adaptive volume profile + POC highlighting",tags:["feat","pr"],agent:"AO",pr:"PR #15"},
    {title:"httpx integration tests (12 endpoints)",tags:["test","pr"],agent:"AO",pr:"PR #17"},
  ],
  done: [
    {title:"Fix broken frontend cards + backend API bugs (Opus QA)",tags:["fix","pr"],pr:"PR #19 ✅"},
    {title:"VWAP Deviation + Market Regime cards",tags:["feat","pr"],pr:"PR #18 ✅"},
    {title:"Restart recovery test suite",tags:["test","pr"],pr:"PR #16 ✅"},
    {title:"Adaptive volume profile",tags:["feat","pr"],pr:"PR #15 ✅"},
    {title:"Integration test suite",tags:["test","pr"],pr:"PR #14 ✅"},
    {title:"Whale order clustering map",tags:["feat","pr"],pr:"PR #13 ✅"},
    {title:"Inter-exchange OI divergence",tags:["feat","pr"],pr:"PR #12 ✅"},
    {title:"Frontend cards (CVD, funding, spread, vol-imbalance)",tags:["feat","pr"],pr:"PR #11 ✅"},
    {title:"Market microstructure score",tags:["feat","pr"],pr:"PR #10 ✅"},
    {title:"Session stats card",tags:["feat","pr"],pr:"PR #9 ✅"},
    {title:"Complete frontend rewrite (297KB→29KB)",tags:["feat","pr"],pr:"PR #8 ✅"},
    {title:"Price ladder heatmap",tags:["feat","pr"],pr:"PR #7 ✅"},
    {title:"Volume clock chart",tags:["feat","pr"],pr:"PR #6 ✅"},
    {title:"Tick imbalance bars",tags:["feat","pr"],pr:"PR #5 ✅"},
    {title:"Net taker delta + short squeeze detector",tags:["feat","pr"],pr:"PR #4 ✅"},
    {title:"Time-of-day volatility pattern",tags:["feat","pr"],pr:"PR #3 ✅"},
    {title:"Order book recovery speed",tags:["feat","pr"],pr:"PR #2 ✅"},
    {title:"Smart money divergence",tags:["feat","pr"],pr:"PR #1 ✅"},
    {title:"pytest suite (10 tests) + CI",tags:["test"],pr:""},
    {title:"residentd daemon + LaunchAgent",tags:["infra"],pr:""},
    {title:"AO→OpenClaw hook bridge",tags:["infra"],pr:""},
    {title:"Ruflo init + memory + swarm",tags:["infra"],pr:""},
    {title:"Workspace git backup",tags:["infra"],pr:""},
    {title:"Hyperskill rewrite (QMD + self-learning)",tags:["infra"],pr:""},
    {title:"Brainstorming autonomous mode",tags:["infra"],pr:""},
  ],
  blocked: [
    {title:"new_mm CI: GitHub billing failure",tags:["fix"],agent:"waiting on Ivan",ts:"since 2026-03-14"},
  ],
};

function renderCard(c){
  const tags = (c.tags||[]).map(t=>`<span class="tag tag-${t}">${t}</span>`).join('');
  const agent = c.agent ? `<span class="agent">🤖 ${c.agent}</span>` : '';
  const pr = c.pr ? `<span class="tag tag-pr">${c.pr}</span>` : '';
  const ts = c.ts ? `<span class="ts">${c.ts}</span>` : '';
  return `<div class="card"><div class="card-title">${c.title}</div><div class="card-meta">${tags}${pr}${agent}${ts}</div></div>`;
}

for(const[col,cards] of Object.entries(DATA)){
  const el = document.getElementById(col);
  if(el) el.innerHTML = cards.map(renderCard).join('');
  const cnt = document.getElementById('cnt-'+col);
  if(cnt) cnt.textContent = cards.length;
}
</script>
</body>
</html>
