name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports (no syntax errors)
        env:
          SYMBOL_BINANCE: BANANAS31USDT
          SYMBOL_BYBIT: BANANAS31USDT
          DB_PATH: /tmp/test.db
        run: |
          cd backend
          python -c "import storage; import collectors; import pollers; import metrics; import api; import main; print('All imports OK')"

      - name: Lint with ruff (optional)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check backend/ --ignore E501,F401
