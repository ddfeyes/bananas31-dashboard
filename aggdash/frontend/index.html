<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BANANAS31 Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #070a10;
      color: #dde4f0;
      overflow-x: hidden;
    }

    /* ── Top Bar ──────────────────────────────────────── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #0c1018;
      border-bottom: 1px solid #1c2438;
      flex-wrap: wrap;
      gap: 8px;
    }

    .top-bar .title {
      font-size: 13px;
      font-weight: 700;
      color: #00c97a;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .stats-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .stat-label {
      font-size: 9px;
      color: #4d566a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 12px;
      color: #dde4f0;
      font-weight: 500;
    }

    .stat-value.positive { color: #00c97a; }
    .stat-value.negative { color: #ff3d5c; }

    .tf-buttons {
      display: flex;
      gap: 4px;
    }

    .tf-btn {
      background: #131824;
      border: 1px solid #253047;
      color: #6b7a94;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .tf-btn:hover { border-color: #3a4a6a; color: #9aa8c0; }
    .tf-btn.active { background: #1a2540; border-color: #4a8fff; color: #4a8fff; }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: #4d566a;
    }

    .conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4d566a;
    }

    .conn-dot.connected { background: #00c97a; }
    .conn-dot.error { background: #ff3d5c; }

    /* ── Chart Panels ─────────────────────────────────── */
    .charts-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 52px);
    }

    .chart-panel {
      position: relative;
      border-bottom: 1px solid #1c2438;
    }

    .chart-panel .panel-label {
      position: absolute;
      top: 4px;
      left: 10px;
      font-size: 9px;
      color: #4d566a;
      z-index: 10;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      pointer-events: none;
    }

    .chart-panel .legend {
      position: absolute;
      top: 4px;
      right: 10px;
      display: flex;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: #6b7a94;
    }

    .legend-swatch {
      width: 10px;
      height: 3px;
      border-radius: 1px;
    }

    #panel-price  { flex: 6; min-height: 200px; }
    #panel-basis  { flex: 2; min-height: 100px; }
    #panel-oi     { flex: 2; min-height: 100px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="title">BANANAS31</div>

    <div class="stats-row">
      <div class="stat-cell">
        <span class="stat-label">BN-SPOT</span>
        <span class="stat-value" id="stat-bn-spot">--</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">BN-PERP</span>
        <span class="stat-value" id="stat-bn-perp">--</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">BB-PERP</span>
        <span class="stat-value" id="stat-bb-perp">--</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">DEX</span>
        <span class="stat-value" id="stat-dex">--</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">FUNDING</span>
        <span class="stat-value" id="stat-funding">--</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">OI</span>
        <span class="stat-value" id="stat-oi">--</span>
      </div>
      <div class="stat-cell">
        <span class="stat-label">DEX-SPREAD</span>
        <span class="stat-value" id="stat-dex-spread">--</span>
      </div>
    </div>

    <div class="tf-buttons">
      <button class="tf-btn active" data-minutes="60">1H</button>
      <button class="tf-btn" data-minutes="240">4H</button>
      <button class="tf-btn" data-minutes="1440">1D</button>
      <button class="tf-btn" data-minutes="10080">7D</button>
    </div>

    <div class="conn-status">
      <div class="conn-dot" id="conn-dot"></div>
      <span id="conn-label">--</span>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-container">
    <div class="chart-panel" id="panel-price">
      <div class="panel-label">PRICE + VOLUME</div>
      <div class="legend">
        <span class="legend-item"><span class="legend-swatch" style="background:#00c97a"></span>BN Spot (candle)</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#ff7a35"></span>BN Perp</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#9d6fff"></span>BB Perp</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#00c8f5"></span>DEX</span>
      </div>
    </div>
    <div class="chart-panel" id="panel-basis">
      <div class="panel-label">BASIS %</div>
      <div class="legend">
        <span class="legend-item"><span class="legend-swatch" style="background:#f0b90b"></span>Binance</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#9d6fff"></span>Bybit</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#00c8f5"></span>Aggregated</span>
      </div>
    </div>
    <div class="chart-panel" id="panel-oi">
      <div class="panel-label">OPEN INTEREST</div>
      <div class="legend">
        <span class="legend-item"><span class="legend-swatch" style="background:#4a8fff"></span>Aggregated</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#f0b90b"></span>Binance</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#9d6fff"></span>Bybit</span>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
